<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Computing for Novices — Let's Get Started</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    color: #1f2328;
    background: #ffffff;
    padding: 32px 16px 48px;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    font-size: 1.65rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .header p {
    color: #57606a;
    font-size: 0.95rem;
  }

  /* ── QR panel ── */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }
  .qr-panel {
    width: 100%;
    max-width: 380px;
    background: #f7f8fa;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 24px 20px;
    text-align: center;
  }
  .qr-panel h2 {
    font-size: 0.88rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #57606a;
    margin-bottom: 16px;
  }
  .qr-placeholder {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    border: 2px dashed #e5e7eb;
    border-radius: 8px;
    margin-bottom: 16px;
    color: #57606a;
    font-size: 0.85rem;
    line-height: 1.5;
  }
  /* Swap .qr-placeholder for an <img class="qr-img"> once you have the new QR code */
  .qr-img {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    display: block;
    margin: 0 auto 16px;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    background: #fff;
  }
  .qr-url {
    font-size: 0.78rem;
    color: #3b82d4;
    word-break: break-all;
    line-height: 1.4;
    display: block;
  }

  /* ── Divider ── */
  hr { border: none; border-top: 1px solid #e5e7eb; margin: 28px 0; }

  /* ── Footer ── */
  footer {
    margin-top: 40px;
    border-top: 1px solid #e5e7eb;
    padding-top: 14px;
    text-align: center;
    font-size: 12px;
    color: #57606a;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>Quantum Computing for Novices</h1>
    <p><a href="https://tinyurl.com/qaccount"></p>https://tinyurl.com/qaccount</a></p>
  </div>

  <div class="qr-section">
    <div class="qr-panel">
      <h2>Scan to Begin</h2>
      <!-- Replace the div below with: <img class="qr-img" src="your-new-qr.png" alt="QR code"> -->
      <img class="qr-img" src="qaccount-qr.png" alt="QR code">
      <span class="qr-url"><!-- paste the URL here --></span>
    </div>
  </div>

  <hr>

  <footer>
    Part of the IBM Quantum Novice Tutorial Set &nbsp;·&nbsp; Made with IBM Bob
  </footer>

</div>
</body>
</html>
